<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Ticket Pro - Demo</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        button { background: #007bff; color: white; border: none; padding: 15px 25px; border-radius: 5px; cursor: pointer; width: 100%; margin: 10px 0; font-size: 16px; }
        #status { color: #555; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Ticketera Terreno</h1>
    <div class="card">
        <h3>Ticket #6001</h3>
        <p>Cliente: Soprole - Planta Stgo.</p>
        <p>Estado: <strong id="ticket-state">Pendiente</strong></p>
        <button onclick="cerrarTicket()">Cerrar Ticket (GPS + Offline)</button>
        <button style="background: #28a745;" onclick="simularNotificacion()">Simular Nueva Asignación</button>
    </div>
    <div id="status"></div>

    <script src="app.js"></script>
</body>
</html>
